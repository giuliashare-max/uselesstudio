<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Layout C — Centrato</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Space Grotesk',Arial,sans-serif;background:#fff;color:#111;min-height:100vh}
body{display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR — solo testo centrato */
nav{
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#ccc}
.wa{font-size:9px;font-weight:800;letter-spacing:.14em;background:none;border:none;cursor:pointer;font-family:inherit;color:#111;text-transform:uppercase}

/* HERO — tutto centrato, titolo prende tutto lo spazio */
main{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
  gap:0;
}

h1{
  font-size:clamp(60px,22vw,96px);
  font-weight:800;line-height:.78;
  letter-spacing:-.06em;text-transform:uppercase;
  margin-bottom:40px;
}

/* separatore sottile */
.sep{width:1px;height:32px;background:#ddd;margin:0 auto 32px}

/* card — centrata, compatta */
.card-label{font-size:9px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#ccc;margin-bottom:10px}
.card-title{font-size:clamp(20px,7vw,30px);font-weight:800;letter-spacing:-.04em;text-transform:uppercase;line-height:.9;margin-bottom:8px;word-break:break-word}
.card-desc{font-size:10px;color:#aaa;line-height:1.6;margin-bottom:20px;max-width:220px;margin-left:auto;margin-right:auto}

.spin{
  padding:13px 32px;
  background:#111;color:#fff;
  font-family:inherit;font-size:11px;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
  border:none;cursor:pointer;
}

/* archive — link testuale centrato */
.archive-toggle{
  display:block;
  text-align:center;
  margin-top:20px;
  font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#ccc;
  cursor:pointer;background:none;border:none;font-family:inherit;
}
.archive-toggle:hover{color:#111}

/* grid — 2 colonne centrate */
.grid{
  display:grid;grid-template-columns:1fr 1fr;
  width:100%;max-width:320px;
  margin-top:16px;
  border:1px solid #eee;
}
.mini{
  padding:12px 14px;
  border-right:1px solid #eee;border-bottom:1px solid #eee;
  text-decoration:none;color:#111;
  display:flex;flex-direction:column;gap:3px;text-align:left;
}
.mini:nth-child(2n){border-right:none}
.mini:nth-last-child(-n+2){border-bottom:none}
.mini-num{font-size:8px;font-weight:800;letter-spacing:.14em;color:#ddd}
.mini h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;line-height:1.1}
.mini p{font-size:9px;color:#aaa;line-height:1.3}

/* FOOTER */
footer{
  padding:14px 20px;text-align:center;
  font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#ddd;
}
</style>
</head>
<body>

<nav>
  <span class="brand">© Useless Studio</span>
  <button class="wa">WA</button>
</nav>

<main>
  <h1>Gioca<br>con<br>me.</h1>

  <div class="sep"></div>

  <div class="card-label">In rotazione ora</div>
  <div class="card-title">Piccione<br>Viaggiatore</div>
  <div class="card-desc">Sistema di messaggistica lenta.</div>
  <button class="spin">Gira →</button>

  <button class="archive-toggle" onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden;this.textContent=this.textContent==='Scegline un altro ↓'?'Scegline un altro ↑':'Scegline un altro ↓'">Scegline un altro ↓</button>

  <div class="grid" hidden>
    <a class="mini" href="#"><span class="mini-num">01</span><h3>Licenziati</h3><p>Dimissioni.</p></a>
    <a class="mini" href="#"><span class="mini-num">02</span><h3>Niente</h3><p>Lei finge.</p></a>
    <a class="mini" href="#"><span class="mini-num">03</span><h3>Cose Inutili</h3><p>100 def.</p></a>
    <a class="mini" href="#"><span class="mini-num">04</span><h3>Font Detective</h3><p>Sans Serif?</p></a>
    <a class="mini" href="#"><span class="mini-num">05</span><h3>Piccione</h3><p>Lento.</p></a>
    <a class="mini" href="#"><span class="mini-num">06</span><h3>Final</h3><p>Trova il file.</p></a>
  </div>
</main>

<footer>Salvami in home / dock ↑</footer>

</body>
</html>
