<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GG — Power Button</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Space Grotesk',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden}
body{display:flex;flex-direction:column;min-height:100vh}

/* SCHERMATA SPENTA */
.screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:0;position:relative}

/* brand sottilissimo */
.brand{position:absolute;top:18px;left:0;right:0;font-size:9px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.12);text-align:center}

/* titolo sopra */
h1{font-size:clamp(40px,14vw,60px);font-weight:800;line-height:.86;letter-spacing:-.05em;text-transform:uppercase;margin-bottom:12px;color:rgba(255,255,255,.9)}
.pre{font-size:10px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:24px}

/* IL PULSANTE DI ACCENSIONE */
.power-wrap{margin:32px 0 40px;position:relative;display:flex;align-items:center;justify-content:center}
/* anello esterno pulsante */
.power-ring{
  width:120px;height:120px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
/* alone animato */
.power-ring::before{
  content:'';
  position:absolute;inset:-8px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.04);
  animation:breathe 3s ease-in-out infinite;
}
.power-ring::after{
  content:'';
  position:absolute;inset:-18px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.02);
  animation:breathe 3s ease-in-out infinite .5s;
}
@keyframes breathe{
  0%,100%{opacity:0;transform:scale(.95)}
  50%{opacity:1;transform:scale(1)}
}

/* bottone vero */
.power-btn{
  width:90px;height:90px;border-radius:50%;
  background:#1a1a1a;
  border:1.5px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  position:relative;
  transition:background .2s,border-color .2s;
  box-shadow:0 0 0 0 rgba(255,255,255,0);
}
.power-btn:hover{background:#222;border-color:rgba(255,255,255,.25)}
.power-btn:active{transform:scale(.96)}
/* simbolo power SVG */
.power-svg{width:36px;height:36px;stroke:rgba(255,255,255,.5);fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke .2s}
.power-btn:hover .power-svg{stroke:rgba(255,255,255,.9)}

/* stato — prima del click */
.state-off{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.1em;text-transform:uppercase;font-weight:700}

/* CARD — mostrata dopo accensione */
.card-wrap{width:100%;max-width:340px;text-align:left;opacity:0;transform:translateY(10px);transition:opacity .4s,transform .4s;pointer-events:none}
.card-wrap.on{opacity:1;transform:translateY(0);pointer-events:all}

.card-label{font-size:8.5px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-label::before{content:'';width:6px;height:6px;background:#22c55e;border-radius:50%;display:inline-block;animation:blink-g 1.5s infinite}
@keyframes blink-g{0%,100%{opacity:1}50%{opacity:.2}}
.card-title{font-size:clamp(28px,10vw,42px);font-weight:800;line-height:.88;letter-spacing:-.05em;text-transform:uppercase;color:#fff;margin-bottom:6px;word-break:break-word}
.card-desc{font-size:11px;color:rgba(255,255,255,.45);line-height:1.6;margin-bottom:16px}
.card-actions{display:flex;gap:8px}
.btn-play{padding:11px 28px;background:#fff;color:#0a0a0a;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer}
.btn-skip{padding:11px 16px;background:transparent;color:rgba(255,255,255,.3);font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.08em;border:1px solid rgba(255,255,255,.1);cursor:pointer;text-transform:uppercase}

/* app grid — accessibile dopo accensione */
.grid{width:100%;max-width:340px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;opacity:0;transition:opacity .4s .2s;pointer-events:none}
.grid.on{opacity:1;pointer-events:all}
.grid-app{aspect-ratio:1;background:rgba(255,255,255,.05);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:22px;cursor:pointer;border:1px solid rgba(255,255,255,.04)}
.grid-app span{font-size:8px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.3);text-transform:uppercase}

/* footer */
.footer{padding:14px 20px;text-align:center;font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.1)}
</style>
</head>
<body>

<div class="screen">
  <div class="brand">© Useless Studio — Micro-app inutili. Necessarie.</div>

  <div class="pre">Premi per giocare</div>
  <h1>Gioca<br>con<br>me.</h1>

  <div class="power-wrap">
    <div class="power-ring">
      <button class="power-btn" id="powerBtn" onclick="togglePower()">
        <svg class="power-svg" viewBox="0 0 36 36">
          <path d="M18 4v14"/>
          <path d="M10.5 8.5A13 13 0 1 0 25.5 8.5"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="state-off" id="stateLabel">Spento</div>

  <div class="card-wrap" id="card" style="margin-top:28px">
    <div class="card-label">In rotazione</div>
    <div class="card-title">Piccione<br>Viaggiatore</div>
    <div class="card-desc">Sistema di messaggistica lenta. Perché certe cose meritano tempo.</div>
    <div class="card-actions">
      <button class="btn-play">Gioca →</button>
      <button class="btn-skip">Riestrai</button>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="grid-app">📄<span>01</span></div>
    <div class="grid-app">🤫<span>02</span></div>
    <div class="grid-app">📚<span>03</span></div>
    <div class="grid-app">🔍<span>04</span></div>
  </div>
</div>

<div class="footer">Salvami in home / dock ↑</div>

<script>
let on = false;
function togglePower(){
  on = !on;
  document.getElementById('card').classList.toggle('on', on);
  document.getElementById('grid').classList.toggle('on', on);
  document.getElementById('stateLabel').textContent = on ? 'Acceso' : 'Spento';
  const btn = document.getElementById('powerBtn');
  btn.style.background = on ? '#1a2a1a' : '#1a1a1a';
  btn.style.borderColor = on ? 'rgba(34,197,94,.4)' : 'rgba(255,255,255,.12)';
  btn.querySelector('.power-svg').style.stroke = on ? '#22c55e' : 'rgba(255,255,255,.5)';
}
</script>
</body>
</html>
