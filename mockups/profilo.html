<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CC — Selezione Profilo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Space Grotesk',Arial,sans-serif;background:#111;color:#fff;min-height:100vh;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px 80px;text-align:center}

/* Eyebrow */
.eyebrow{font-size:9px;font-weight:800;letter-spacing:.28em;text-transform:uppercase;color:#555;margin-bottom:32px}

/* Titolo */
h1{font-size:clamp(36px,13vw,56px);font-weight:800;line-height:.86;letter-spacing:-.05em;text-transform:uppercase;margin-bottom:10px;color:#fff}
.sub{font-size:11px;color:#555;line-height:1.65;margin-bottom:48px}

/* PROFILI — cerchi grandi */
.profiles{display:flex;justify-content:center;gap:20px;margin-bottom:44px;flex-wrap:wrap}
.profile{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer}
.avatar{width:80px;height:80px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.profile:hover .avatar{transform:scale(1.06);box-shadow:0 0 0 2px #fff}
.profile.active .avatar{border-color:#fff}
.avatar-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#888;line-height:1.2;max-width:80px}
.profile.active .avatar-label{color:#fff}

/* avatar con colori diversi */
.av1{background:#1c1c1e}
.av2{background:#1c1c1e}
.av3{background:#1c1c1e}
.av4{background:#1c1c1e}

/* bottone entra */
.enter-btn{padding:14px 40px;background:#fff;color:#111;font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;border-radius:4px;margin-bottom:16px}
.enter-sub{font-size:9px;color:#555;letter-spacing:.12em;text-transform:uppercase}

/* footer — app estratta */
.now-playing{position:fixed;bottom:0;left:0;right:0;background:#1c1c1e;border-top:1px solid #2a2a2a;padding:12px 20px;display:flex;align-items:center;gap:12px}
.np-icon{width:40px;height:40px;background:#2a2a2a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.np-info{flex:1;text-align:left}
.np-label{font-size:8px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#555;margin-bottom:2px}
.np-title{font-size:13px;font-weight:800;color:#fff;letter-spacing:-.01em}
.np-play{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>

<div class="eyebrow">© Useless Studio — Chi gioca?</div>
<h1>Gioca<br>con<br>me.</h1>
<p class="sub">Scegli un profilo.<br>Poi non scegliere più niente.</p>

<div class="profiles">
  <div class="profile active">
    <div class="avatar av1">🎲</div>
    <div class="avatar-label">Algoritmo</div>
  </div>
  <div class="profile">
    <div class="avatar av2">🤔</div>
    <div class="avatar-label">Chi non sa</div>
  </div>
  <div class="profile">
    <div class="avatar av3">😴</div>
    <div class="avatar-label">Chi se ne frega</div>
  </div>
  <div class="profile">
    <div class="avatar av4">➕</div>
    <div class="avatar-label">Nuovo profilo</div>
  </div>
</div>

<button class="enter-btn">Entra come Algoritmo →</button>
<div class="enter-sub">o scegli un altro profilo</div>

<div class="now-playing">
  <div class="np-icon">🕊️</div>
  <div class="np-info">
    <div class="np-label">In rotazione ora</div>
    <div class="np-title">Piccione Viaggiatore</div>
  </div>
  <div class="np-play">▶</div>
</div>

</body>
</html>
