<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ARCHIVIA IL NIENTE</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);max-width:88vw;text-align:center;font-size:clamp(15px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}@media(max-width:640px){.title{white-space:normal;line-height:1.25}}:root{--a:#38bdf8}.archive{text-align:center}.folder{position:relative;width:230px;height:150px;border:2px solid var(--a);border-radius:4px;background:#050505;overflow:hidden}.folder:before{content:"";position:absolute;left:18px;top:-22px;width:86px;height:24px;border:2px solid var(--a);border-bottom:0;background:#000}.paper{position:absolute;left:50%;top:-70px;transform:translateX(-50%);width:110px;height:82px;border:2px solid var(--a);animation:archive 4.7s .5s ease-in-out forwards}.read{margin-top:22px;color:var(--a);font-size:22px;letter-spacing:.12em;animation:blink .7s 6}@keyframes archive{0%{top:-70px}70%{top:42px}100%{top:98px;opacity:.15}}@keyframes blink{50%{opacity:.25}}</style></head><body><main class="stage"><div class="title">ARCHIVIA IL NIENTE</div><div class="center"><div class="archive"><div class="folder"><div class="paper"></div></div><div class="read">0 KB</div></div></div><div class="status">ARCHIVIANDO IL NIENTE...</div><div class="result">IL NIENTE È STATO SALVATO CON SUCCESSO.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
