*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);max-width:88vw;text-align:center;font-size:clamp(15px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}@media(max-width:640px){.title{white-space:normal;line-height:1.25}}:root{--a:#ff7a59}.update{width:min(72vw,390px);text-align:center}.track{height:18px;border:2px solid var(--a);padding:3px}.track i{display:block;height:100%;width:0;background:var(--a);animation:fill 5s .4s forwards}.date{margin-top:24px;color:var(--a);font-size:clamp(28px,7vmin,58px);font-weight:800;animation:flicker .8s 5}@keyframes fill{0%{width:0}90%{width:94%}100%{width:100%}}@keyframes flicker{50%{opacity:.28}}</style></head><body><main class="stage"><div class="title">AGGIORNAMENTO DI IERI</div><div class="center"><div class="update"><div class="track"><i></i></div><di setTimeout(function(){

  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }

}, 10720);
</script>
