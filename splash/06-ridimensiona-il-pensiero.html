r(--a);transform:skewY(-35deg);background:#000}.pct{position:absolute;inset:0;display:grid;place-items:center;color:var(--a);font-weight:800;font-size:22px;animation:fade 5s .4s forwards}@keyframes shrink{0%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(.12)}}@keyframes fade{0%{opacity:1}100%{opacity:.15;transform:scale(.2)}}</style></head><body><main class="stage"><div class="title">RIDIMENSIONA IL PENSIERO</div><div class="center"><div class="thought"><div class="bubble"></div><div class="pct">100% → 1%</div></div></div><div class="status">RIDIMENSIONANDO IL PENSIERO...</div><div class="result">ORA IL PENSIERO ENTRA PERFETTAMENTE NEL NULLA.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
