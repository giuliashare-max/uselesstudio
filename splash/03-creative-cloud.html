<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>CREATIVE CLOUD</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);font-size:clamp(16px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}:root{--a:#00c2ff}.cloud{position:relative;width:clamp(180px,34vmin,300px);height:clamp(90px,17vmin,150px);border:2px solid var(--a);border-radius:999px}.cloud:before,.cloud:after{content:"";position:absolute;border:2px solid var(--a);border-bottom:0;background:#000;border-radius:999px 999px 0 0}.cloud:before{width:35%;height:65%;left:14%;top:-42%}.cloud:after{width:28%;height:50%;right:16%;top:-30%}.drop{position:absolute;left:50%;top:62%;width:7px;height:7px;background:var(--a);opacity:0;animation:rain 2.4s 2s forwards}@keyframes rain{0%{opacity:0;transform:translate(-50%,0)}15%{opacity:1}80%{opacity:1;transform:translate(-50%,150px)}100%{opacity:0;transform:translate(-50%,175px)}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}</style></head><body><main class="stage"><div class="title">CREATIVE CLOUD</div><div class="center"><div class="cloud"></div><div class="drop"></div></div><div class="status">SINCRONIZZAZIONE DELLE IDEE...</div><div class="result">BRAINSTORM COMPLETATO. NESSUNA IDEA TROVATA.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
