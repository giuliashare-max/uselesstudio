<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BUG FARM</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);max-width:88vw;text-align:center;font-size:clamp(15px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}@media(max-width:640px){.title{white-space:normal;line-height:1.25}}:root{--a:#ff6b6b}.bugfield{position:relative;width:300px;height:220px;border:1px dashed #444}.bugfield i{position:absolute;width:26px;height:18px;border:2px solid var(--a);border-radius:50%;animation:crawl 1.6s infinite alternate}.bugfield i:before,.bugfield i:after{content:"";position:absolute;left:10px;top:-8px;width:2px;height:32px;background:var(--a);transform:rotate(55deg)}.bugfield i:after{transform:rotate(-55deg)}.bugfield i:nth-child(1){left:20px;top:25px}.bugfield i:nth-child(2){right:36px;top:40px;animation-delay:.3s}.bugfield i:nth-child(3){left:120px;top:95px;animation-delay:.6s}.bugfield i:nth-child(4){left:55px;bottom:30px;animation-delay:.9s}.bugfield i:nth-child(5){right:65px;bottom:20px;animation-delay:1.2s}@keyframes crawl{to{transform:translate(28px,18px) rotate(18deg)}}</style></head><body><main class="stage"><div class="title">BUG FARM</div><div class="center"><div class="bugfield"><i></i><i></i><i></i><i></i><i></i></div></div><div class="status">COLLECTING BUGS...</div><div class="result">FUNZIONALITÀ COMPLETATA.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
