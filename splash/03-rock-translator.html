<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ROCK TRANSLATOR</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);font-size:clamp(16px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff;text-align:center}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}:root{--a:#c084fc}.translator{display:grid;place-items:center;gap:22px}.rock{width:170px;height:110px;background:var(--a);border-radius:46% 54% 42% 58%;position:relative;animation:breathe 1s .5s 5}.rock i{position:absolute;width:9px;height:9px;background:#000;border-radius:50%;top:40px}.rock i:first-child{left:52px}.rock i:last-child{right:52px}.waves{height:44px;display:flex;gap:7px;align-items:center}.waves span{width:4px;height:8px;background:var(--a);animation:wave .75s ease-in-out infinite alternate}.waves span:nth-child(2){animation-delay:.12s}.waves span:nth-child(3){animation-delay:.24s}.waves span:nth-child(4){animation-delay:.36s}.waves span:nth-child(5){animation-delay:.48s}.quote{font-size:28px;letter-spacing:.25em;color:var(--a);opacity:0;animation:show .2s 5.1s forwards}@keyframes breathe{50%{transform:scale(1.02)}}@keyframes wave{to{height:40px}}</style></head><body><main class="stage"><div class="title">ROCK TRANSLATOR</div><div class="center"><div class="translator"><div class="rock"><i></i><i></i></div><div class="waves"><span></span><span></span><span></span><span></span><span></span></div><div class="quote">...</div></div></div><div class="status">ASCOLTANDO LA ROCCIA...</div><div class="result">TRADUZIONE: “…”</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
