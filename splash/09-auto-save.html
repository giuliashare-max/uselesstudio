<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AUTO SAVE</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);width:92%;font-size:clamp(16px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;text-align:center;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92;animation:statusOut .2s 5.55s forwards}.result{position:absolute;left:8%;right:8%;bottom:8%;text-align:center;font-size:clamp(13px,1.8vmin,20px);line-height:1.45;opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logoText{font-size:clamp(32px,8vw,88px);font-weight:900;letter-spacing:-.07em;text-align:center}.logoText small{display:block;font-size:.22em;letter-spacing:.42em;margin-top:.4em}@keyframes show{to{opacity:1}}@keyframes statusOut{to{opacity:0}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}:root{--a:#ffd166}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}}

.render{width:78%;display:grid;gap:20px}.render .frame{height:190px;border:3px solid #fff;position:relative;overflow:hidden}.render .frame:before{content:'';position:absolute;inset:18%;border:3px solid var(--a);transform:rotate(12deg);animation:renderSpin 4.8s ease-in-out forwards}.render .bar{height:16px;border:2px solid #fff}.render .bar i{display:block;height:100%;width:0;background:var(--a);animation:fill 4.8s .3s forwards}@keyframes renderSpin{to{transform:rotate(732deg) scale(.72)}}@keyframes fill{to{width:100%}}
.apology{width:76%;height:70%;border:2px solid #fff;padding:28px;position:relative}.apology b{color:var(--a);letter-spacing:.1em}.apology span{display:block;height:2px;background:#444;margin:24px 0;animation:type 4.6s forwards;transform-origin:left}.apology span:nth-of-type(2){animation-delay:.3s}.apology span:nth-of-type(3){animation-delay:.6s}@keyframes type{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
.save{display:grid;place-items:center;gap:24px}.disk{width:160px;height:160px;border:4px solid var(--a);position:relative;animation:savePulse .8s infinite alternate}.disk:before{content:'';position:absolute;left:28px;right:28px;top:0;height:56px;border:3px solid #fff;border-top:0}.disk:after{content:'';position:absolute;left:34px;right:34px;bottom:28px;height:48px;border:3px solid #fff}.save .meter{width:220px;height:14px;border:2px solid #fff;overflow:hidden}.save .meter i{display:block;height:100%;width:0;background:var(--a);animation:fakeSave 4.9s forwards}@keyframes savePulse{to{transform:scale(1.04)}}@keyframes fakeSave{0%{width:0}78%{width:96%}100%{width:8%}}
.call{display:grid;grid-template-columns:repeat(3,74px);gap:18px}.call i{width:74px;height:74px;border:2px solid #fff;border-radius:50%;position:relative;animation:mute 1.2s infinite}.call i:before{content:'';position:absolute;left:25px;top:18px;width:20px;height:20px;border-radius:50%;background:var(--a);box-shadow:0 25px 0 8px var(--a)}.call i:nth-child(2n){animation-delay:.4s}.call i:nth-child(3n){animation-delay:.8s}@keyframes mute{50%{opacity:.25}}
.queue{width:80%;display:flex;align-items:center;gap:28px}.queue .lane{flex:1;height:4px;background:#fff;position:relative}.queue .lane:after{content:'';position:absolute;width:44px;height:44px;border:3px solid var(--a);top:50%;transform:translateY(-50%);animation:single 4.8s ease-in-out forwards}.queue b{font-size:48px;color:var(--a)}@keyframes single{0%{left:0}70%{left:calc(100% - 44px)}100%{left:42%}}
.elevator{width:210px;height:270px;border:4px solid #fff;position:relative;overflow:hidden}.elevator .doors{position:absolute;inset:0;display:flex}.elevator .doors i{width:50%;height:100%;background:#111;border-right:1px solid var(--a);border-left:1px solid var(--a);animation:doors 4.8s ease-in-out forwards}.elevator .panel{position:absolute;right:-62px;top:80px;color:var(--a);font-size:38px;font-weight:900}.elevator .floor{position:absolute;inset:0;display:grid;place-items:center;font-size:92px;color:var(--a);font-weight:900}@keyframes doors{0%,20%{transform:translateX(0)}55%,75%{transform:translateX(var(--move))}100%{transform:translateX(0)}}.elevator .doors i:first-child{--move:-100%}.elevator .doors i:last-child{--move:100%}
</style></head><body><main class="stage"><div class="title">AUTO SAVE</div><div class="center"><div class="save"><div class="disk"></div><div class="meter"><i></i></div></div></div><div class="status">SALVATAGGIO AUTOMATICO...</div><div class="result">SALVATAGGIO COMPLETATO.<br>NIENTE È STATO SALVATO.</div><div class="logo"><div class="logoText">USELESS<small>STUDIO</small></div></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
