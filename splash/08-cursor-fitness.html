<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>CURSOR FITNESS</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);font-size:clamp(16px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;text-align:center;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92;animation:statusOut .2s 5.55s forwards}.result{position:absolute;left:8%;right:8%;bottom:8%;text-align:center;font-size:clamp(13px,1.8vmin,20px);line-height:1.45;opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}.logoText{font-weight:800;font-size:clamp(32px,8vw,92px);letter-spacing:-.06em}@keyframes show{to{opacity:1}}@keyframes statusOut{to{opacity:0}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}:root{--a:#80ed99}
.route{width:78%;height:65%;position:relative}.route span{position:absolute;inset:12%;border:3px dashed var(--a);border-radius:50%;animation:spin 4.5s linear forwards}.route i{position:absolute;width:34px;height:34px;border:2px solid #fff;border-radius:50%;display:grid;place-items:center;font-style:normal}.route i:nth-of-type(1){left:8%;top:45%}.route i:nth-of-type(2){right:8%;top:45%}@keyframes spin{to{transform:rotate(720deg)}}
.recycle{display:flex;align-items:center;gap:clamp(16px,5vw,54px);font-weight:800}.recycle b{border:2px solid #fff;padding:18px 14px;min-width:110px;text-align:center}.recycle span{font-size:70px;color:var(--a);animation:spin 1s linear infinite}
.belt{position:relative;width:80%;height:130px;border-bottom:4px solid #fff;display:flex;align-items:flex-end;gap:30px;padding:0 20px 18px;overflow:hidden}.belt div{width:54px;height:54px;border:3px solid var(--a);animation:move 2s linear infinite}.belt span{position:absolute;left:0;right:0;bottom:-10px;height:18px;background:repeating-linear-gradient(90deg,#fff 0 12px,transparent 12px 24px)}@keyframes move{to{transform:translateX(260px) rotate(360deg);opacity:0}}
.cloud{position:relative;width:230px;height:120px;background:var(--a);border-radius:70px;display:grid;place-items:center}.cloud i{position:absolute;background:var(--a);border-radius:50%}.cloud i:nth-child(1){width:100px;height:100px;left:20px;top:-45px}.cloud i:nth-child(2){width:120px;height:120px;right:18px;top:-58px}.cloud i:nth-child(3){width:70px;height:70px;left:85px;top:-28px}.cloud b{z-index:2;color:#000;font-size:38px;animation:pulse 1s infinite}@keyframes pulse{50%{opacity:.25}}
.cursor{display:grid;place-items:center;gap:30px}.cursor>span{font-size:100px;color:var(--a);animation:pushup 1s ease-in-out infinite alternate}.bar{width:240px;height:18px;border:2px solid #fff}.bar i{display:block;width:0;height:100%;background:var(--a);animation:fill 4.7s .4s forwards}@keyframes pushup{to{transform:translateY(-28px)}}@keyframes fill{to{width:100%}}
.draft{width:220px;height:280px;border:3px solid #fff;padding:70px 26px 20px;position:relative}.draft span{display:block;height:2px;background:#444;margin:20px 0;animation:erase 4.8s forwards}.draft b{position:absolute;top:24px;left:26px;color:var(--a);letter-spacing:.12em}@keyframes erase{to{width:0;opacity:0}}
.meeting{display:grid;grid-template-columns:repeat(2,90px);gap:22px;position:relative}.meeting i{width:90px;height:90px;border:2px solid #fff;border-radius:50%;position:relative}.meeting i:after{content:'';position:absolute;left:28px;top:24px;width:30px;height:30px;border-radius:50%;background:var(--a);box-shadow:0 34px 0 12px var(--a)}.meeting span{grid-column:1/3;text-align:center;color:var(--a);font-weight:800;animation:pulse .8s infinite}
.agency{display:grid;place-items:center;gap:24px}.spinner{width:150px;height:150px;border:12px solid #222;border-top-color:var(--a);border-radius:50%;animation:spin 1s linear infinite}.agency b{font-size:32px;color:var(--a)}
@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}@media(max-width:560px){.title{white-space:normal;width:90%;}.recycle{transform:scale(.72)}.result{bottom:7%}}
</style></head><body><main class="stage"><div class="title">CURSOR FITNESS</div><div class="center"><div class="cursor"><span>➤</span><div class="bar"><i></i></div></div></div><div class="status">RISCALDAMENTO DEL PUNTATORE...</div><div class="result">RISCALDAMENTO COMPLETATO.<br>MOUSE PRONTO. UTENTE NON VERIFICATO.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
