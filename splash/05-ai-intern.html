<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AI INTERN</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);max-width:88vw;text-align:center;font-size:clamp(15px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}@media(max-width:640px){.title{white-space:normal;line-height:1.25}}:root{--a:#4de1c1}.intern{position:relative;width:280px;height:230px}.bot{position:absolute;left:20px;top:42px;width:105px;height:90px;border:2px solid var(--a);display:grid;place-items:center;color:var(--a);font-size:34px;font-weight:800;animation:bot 1s .5s 5 alternate}.bot:before,.bot:after{content:"";position:absolute;top:35px;width:16px;height:2px;background:var(--a)}.bot:before{left:-18px}.bot:after{right:-18px}.papers{position:absolute;left:138px;top:42px;width:60px}.papers i{display:block;width:52px;height:38px;border:1px solid var(--a);margin-bottom:-25px;background:#000;animation:paper 1.15s .4s 4 forwards}.papers i:nth-child(2){animation-delay:.7s}.papers i:nth-child(3){animation-delay:1s}.bin{position:absolute;right:20px;bottom:25px;width:68px;height:76px;border:2px solid var(--a);border-top:0}.bin:before{content:"";position:absolute;left:-7px;right:-7px;top:-8px;height:5px;background:var(--a)}@keyframes paper{60%,100%{transform:translate(55px,105px) rotate(22deg);opacity:0}}@keyframes bot{to{transform:translateY(-4px)}}</style></head><body><main class="stage"><div class="title">AI INTERN</div><div class="center"><div class="intern"><div class="bot">AI</div><div class="papers"><i></i><i></i><i></i></div><div class="bin"></div></div></div><div class="status">AUTOMATIZZANDO L’ERRORE...</div><div class="result">HA AUTOMATIZZATO L’ERRORE CON GRANDE EFFICIENZA.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>
<script>
setTimeout(function(){
  // ferma QUALUNQUE timer JS residuo del file (setInterval/setTimeout),
  // non solo le animazioni CSS: alcuni file usano loop in JS per cambiare
  // il contenuto (es. setInterval), che altrimenti continuerebbero a
  // girare dopo il segnale di fine, causando un flash residuo.
  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }
  } catch (e) {}
  try { window.parent.postMessage('splash-done','*'); } catch (e) {}
}, 10720);
</script>
</body></html>
