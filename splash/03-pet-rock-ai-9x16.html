<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>PET ROCK AI</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff}body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.stage{position:relative;width:100vw;height:100svh;min-height:100vh;background:#000;overflow:hidden}.title{position:absolute;top:clamp(22px,4vh,48px);left:50%;transform:translateX(-50%);font-size:clamp(16px,2.1vmin,24px);letter-spacing:.12em;font-weight:700;white-space:nowrap;color:#fff;text-align:center}.center{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:min(70vmin,560px);height:min(54vmin,420px);display:grid;place-items:center}.status{position:absolute;left:8%;right:8%;bottom:16%;text-align:center;font-size:clamp(12px,1.6vmin,18px);opacity:.92}.result{position:absolute;left:8%;right:8%;bottom:9%;text-align:center;font-size:clamp(13px,1.8vmin,20px);opacity:0;animation:show .25s 5.6s forwards}.logo{position:absolute;inset:0;display:grid;place-items:center;background:#000;opacity:0;z-index:20;animation:logoIn 2.8s 7.9s forwards}.logo img{width:min(62vw,420px);max-height:52vh;object-fit:contain}@keyframes show{to{opacity:1}}@keyframes logoIn{0%{opacity:0}10%{opacity:1}90%{opacity:1}100%{opacity:1}}@media(orientation:landscape){.center{width:min(52vh,560px);height:min(46vh,400px)}.logo img{width:min(34vw,420px)}}:root{--a:#a3e635}.rock{width:180px;height:118px;background:var(--a);border-radius:46% 54% 42% 58%;position:relative;animation:think 1s .5s 5}.rock i{position:absolute;width:9px;height:9px;background:#000;border-radius:50%;top:43px}.rock i:first-child{left:54px}.rock i:last-child{right:54px}.brain{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);color:#000;font-weight:800;font-size:18px;letter-spacing:.12em}.pulse{position:absolute;border:1px solid var(--a);border-radius:50%;width:210px;height:150px;opacity:0;animation:pulse 2s .4s 2}.p2{animation-delay:1.4s}@keyframes think{25%{transform:rotate(-1deg)}75%{transform:rotate(1deg)}}@keyframes pulse{0%{transform:scale(.7);opacity:.8}100%{transform:scale(1.45);opacity:0}}</style></head><body><main class="stage"><div class="title">PET ROCK AI</div><div class="center"><div class="rock"><i></i><i></i><div class="brain">AI</div></div><div class="pulse p1"></div><div class="pulse p2"></div></div><div class="status">INSEGNANDO ALLA ROCCIA A PENSARE...</div><div class="result">NESSUN PENSIERO RILEVATO.</div><div class="logo"><img src="useless-studio-logo.png" alt="Useless Studio"></div></main>

  try {
    var killId = setInterval(function(){}, 1 << 30);
    for (var i = 0; i <= killId; i++) { clearInterval(i); clearTimeout(i); }

</body></html>
