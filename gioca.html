<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Useless Studio</title>
  <meta property="og:title" content="Useless Studio" />
  <meta property="og:description" content="Micro-app inutili ma necessarie" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Useless Studio" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100%; height: 100%; }
    body { font-family: 'Space Grotesk', Arial, sans-serif; background: #fff; }

    .bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #111;
    }

    .bar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .bar-logo {
      width: 20px; height: 20px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .bar-back {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #aaa;
      white-space: nowrap;
    }

    .game-name {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .share-btn {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .share-btn:hover { opacity: .5; }

    iframe {
      display: block;
      width: 100%;
      max-width: 100%;
      height: calc(100vh - var(--bar-h, 53px));
      margin-top: var(--bar-h, 53px);
      border: none;
    }

    @media (max-width: 600px) {
      .bar { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <script>
    // Usa lo stesso layout pescato in home per coerenza visiva dell'header
    (function () {
      var n;
      try { n = sessionStorage.getItem('gcm-layout'); } catch (e) {}
      n = parseInt(n, 10);
      if (n >= 1 && n <= 5) document.body.classList.add('layout-' + n);
    })();
  </script>
  <div class="bar">
    <a class="bar-brand" href="index.html">
      <img class="bar-logo" src="icons/logo.png" alt="Useless Studio">
      <span class="bar-back">← Roulette</span>
    </a>
    <span class="game-name" id="gameName"></span>
    <a class="share-btn" id="shareBtn" href="#" target="_blank" rel="noopener">WA</a>
  </div>
  <iframe id="frame" src="" allowfullscreen allow="web-share; clipboard-write; camera; microphone"></iframe>
  <script>
    const params = new URLSearchParams(location.search);
    const url = params.get('url');
    const name = params.get('name');
    if (url) {
      const bust = url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
      document.getElementById('frame').src = bust;
      const msg = name ? 'Gioca a ' + name + ' → ' + url : url;
      document.getElementById('shareBtn').href = 'https://wa.me/?text=' + encodeURIComponent(msg);
    }
    if (name) document.getElementById('gameName').textContent = name;

    function syncBarHeight() {
      const bar = document.querySelector('.bar');
      if (bar) document.documentElement.style.setProperty('--bar-h', bar.offsetHeight + 'px');
    }
    syncBarHeight();
    window.addEventListener('resize', syncBarHeight);
    window.addEventListener('orientationchange', syncBarHeight);
  </script>
</body>
</html>
